# ==============================
# Spring Application Settings
# ==============================
spring.application.name=ServiceBooking
server.port=8080

# ==============================
# Database Connection (PostgreSQL)
# ==============================
# Using environment variables from your .env file
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# Hibernate / JPA Settings
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT Configuration
# ==============================
# Secret key must be at least 64 characters
jwt.secret=MySuperSecretKeyForJWTThatIsAtLeast64CharactersLong1234567890!
# Expiration in milliseconds (1 hour = 3600000 ms)
jwt.expiration=3600000

# ==============================
# File Upload
# ==============================
file.upload-dir=${FILE_UPLOAD_DIR}

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# ==============================
# Logging
# ==============================
logging.level.org.springframework=INFO
logging.level.com.rental_api.ServiceBooking=DEBUG

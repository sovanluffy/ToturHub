# ==============================
# Server & App
# ==============================
spring.application.name=ServiceBooking
# Render provides the PORT variable; 8080 is only for local dev
server.port=${PORT:8080}
# Tells Spring it is behind Render's proxy (important for HTTPS/Swagger)
server.forward-headers-strategy=framework

# ==============================
# Database (Neon / Render Optimized)
# ==============================
# sslmode=require is mandatory for Neon
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:service_db}?sslmode=require
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT Security
# ==============================
jwt.secret=${JWT_SECRET:MySuperSecretKeyWith64+CharactersForDevOnly1234567890!}
jwt.expiration=${JWT_EXPIRATION:86400000}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ==============================
# Swagger / OpenAPI (HTTPS Fix)
# ==============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.try-it-out-enabled=true
# This ensures Swagger uses https://toturhub-dev.onrender.com instead of http
springdoc.server.url=${RENDER_EXTERNAL_URL:http://localhost:8080}
# Force Swagger to use the production URL
springdoc.server.url=https://toturhub-dev.onrender.com
# Enable forwarding headers so Swagger doesn't default to HTTP
server.forward-headers-strategy=framework
# ==============================
# Cloudinary (Media Uploads)
# ==============================
cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_KEY}
cloudinary.api_secret=${CLOUDINARY_SECRET}

# ==============================
# Google & Facebook OAuth2
# ==============================
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI}

facebook.client-id=${FACEBOOK_APP_ID}
facebook.client-secret=${FACEBOOK_APP_SECRET}
facebook.redirect-uri=${FACEBOOK_REDIRECT_URI}
server.forward-headers-strategy=framework
# ==============================
# File Limits
# ==============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# ==============================
# Application
# ==============================
spring.application.name=ServiceBooking

# Render provides PORT automatically
server.port=${PORT}
server.forward-headers-strategy=framework

# ==============================
# Database (Neon PostgreSQL)
# ==============================
# IMPORTANT: Environment variables must come from .env or Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT Security
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Fix Spring Boot path matching
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.server.url=${RENDER_EXTERNAL_URL:http://localhost:8080}

# ==============================
# File Upload Limits
# ==============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
spring.main.allow-bean-definition-overriding=true

# ==============================
# Cloudinary (Media Upload)
# ==============================
cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_KEY}
cloudinary.api_secret=${CLOUDINARY_SECRET}

# ==============================
# Google OAuth2
# ==============================
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI}

# ==============================
# Facebook OAuth2
# ==============================
facebook.client-id=${FACEBOOK_APP_ID}
facebook.client-secret=${FACEBOOK_APP_SECRET}
facebook.redirect-uri=${FACEBOOK_REDIRECT_URI}

# ==============================
# Admin Auto Create
# ==============================
admin.fullname=${ADMIN_FULLNAME}
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
admin.phone=${ADMIN_PHONE}
admin.address=${ADMIN_ADDRESS}
admin.location=${ADMIN_LOCATION}


# ==============================
# Spring Application
# ==============================
spring.application.name=ServiceBooking

# Server port, fallback to 8080 if APP_PORT not set
server.port=${APP_PORT:8080}

# ==============================
# Database Connection (PostgreSQL)
# ==============================
# Example: jdbc:postgresql://localhost:5432/service_db
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:service_db}?sslmode=${DB_SSLMODE:disable}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Throw exception if no endpoint found
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ==============================
# Hibernate / JPA
# ==============================
# Auto-create/update tables based on entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT Configuration
# ==============================
# Secret key for JWT (must be 64+ characters for HS512)
jwt.secret=${JWT_SECRET:MySuperSecretKeyWith64+CharactersForDevOnly1234567890!}
# Token expiration in milliseconds (default: 1 hour)
jwt.expiration=${JWT_EXPIRATION:3600000}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ==============================
# File Upload
# ==============================
# Folder to store uploaded files
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# ==============================
# Logging
# ==============================
logging.level.org.springframework=INFO
logging.level.com.rental_api.ServiceBooking=DEBUG

